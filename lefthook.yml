assert_lefthook_installed: true
glob_matcher: doublestar

commit-msg:
  jobs:
    - name: commitlint
      run: npx --no-install commitlint --edit

pre-commit:
  parallel: false
  jobs:
    - name: minify
      run: npx minijson {staged_files}
      glob: "src/**/*.json"
      stage_fixed: true
    - name: fmt
      run: npx dprint fmt --allow-no-files {staged_files}
      glob: "**/*.*"
      stage_fixed: true
